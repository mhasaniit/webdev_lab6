<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WebDev Lab 6</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Devonshire&display=swap" rel="stylesheet">
  <!-- CSS LINK -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="page-wrapper">
  <!-- HEADER -->
  <div id="header">
    <a id="logo1" href="#">
      <img src="images/logo.png" alt="Logo">
    </a>
    <h1>My Website</h1>
    <a id="toplink" href="#">Top</a>
  </div>
  <!-- NAVIGATION -->
  <div id="main-nav">
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Gallery</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </div>
  <!-- CONTENT WRAPPER -->
  <div id="content-wrapper">
    <!-- MAIN CONTENT -->
    <div id="main-content">
      <h2><strong>Main Heading</strong></h2>
      <p>
        This is your main content area. 
        <strong>Important text</strong> will appear larger.
      </p>
      <img src="images/sample.jpg" alt="Sample Image" class="image-r">
      <p>
        More paragraph text goes here to show layout wrapping around the image.
      </p>
    </div>
    <!-- SIDE CONTENT -->
    <div id="side-content">
      <h3>Side Content</h3>
      <p>This is the sidebar area.</p>
    </div>
  </div>
  <!-- FOOTER -->
  <div id="footer">
  </div>
</div>
</body>
</html>
